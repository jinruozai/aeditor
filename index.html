<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aiditor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Full framework bundle, generated by tools/build.mjs from src/. -->
  <link rel="stylesheet" href="./dist/aiditor-full.css?v=13">

  <!-- Demo-only styling. -->
  <link rel="stylesheet" href="./demo/components/demo.css?v=11">
  <style>
    html, body { margin: 0; height: 100%; background: var(--aiditor-bg-0, #07070a); overflow: hidden; }
    .aid-topbar {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      background: var(--aiditor-bg-0, #07070a);
      border-bottom: 1px solid var(--aiditor-chrome-border, var(--aiditor-border, #3a3a3a));
      color: var(--aiditor-fg-1, #e8e8e8);
      box-sizing: border-box;
      user-select: none;
    }
    .aid-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 28px;
      padding: 0 9px 0 7px;
      border: 1px solid transparent;
      border-radius: var(--aiditor-r-2, 4px);
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    .aid-brand:hover {
      background: var(--aiditor-hover, rgba(255,255,255,.06));
      border-color: var(--aiditor-border, rgba(255,255,255,.08));
    }
    .aid-brand-icon {
      width: 20px;
      height: 20px;
      background: url("./logo.svg") center / contain no-repeat;
      flex: none;
    }
    .aid-brand-name {
      letter-spacing: 0;
    }
    .aid-project-name {
      min-width: 0;
      max-width: 40vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--aiditor-fg-2, #bdbdbd);
      font-size: 12px;
    }
    .aid-project-name::before {
      content: "/";
      margin-right: 10px;
      color: var(--aiditor-fg-3, #888);
    }
    .aid-topbar-spacer { flex: 1 1 auto; }
    .aid-lang-btn { min-width: 58px; }
    .aid-body { width: 100vw; height: calc(100dvh - 36px); overflow: hidden; }
    #app { width: 100%; height: 100%; }
    body.is-popup .aid-topbar { display: none; }
    body.is-popup .aid-body { height: 100dvh; }
  </style>
</head>
<body>
  <div id="aid-topbar" class="aid-topbar"></div>
  <div class="aid-body">
    <div id="app"></div>
  </div>

  <!-- One full bundle for the demo. Core-only hosts can use dist/aiditor-core.*. -->
  <script src="./dist/aiditor-full.js?v=13"></script>

  <!-- Demo data & glue; must load before any component that touches Demo.*. -->
  <script src="./demo/catalog.js?v=11"></script>
  <script src="./demo/state.js?v=11"></script>
  <script src="./demo/ai-targets.js?v=12"></script>
  <script src="./demo/topbar.js?v=14"></script>
  <script src="./demo/project.js?v=12"></script>

  <!-- Demo panel components. -->
  <script src="./demo/components/ui-gallery.js?v=11"></script>
  <script src="./demo/components/panel-list.js?v=11"></script>
  <script src="./demo/components/theme-config.js?v=11"></script>

  <script>
    'use strict'
    const ui = aiditor.ui

    // Build the layout
    //
    // Layout: left navigation dock + combined AI chat dock.
    const { createDockLayout, dock, split, panel } = aiditor
    const isPopup = new URLSearchParams(window.location.search).has('aiditor-popup')
    document.body.classList.toggle('is-popup', isPopup)
    if (!isPopup && window.AiditorTopBar) {
      window.AiditorTopBar.mount(document.getElementById('aid-topbar'))
    }

    let tree
    if (isPopup) {
      tree = dock({
        name: 'popup-root',
        toolbar: {
          direction: 'top',
          items: [
            { component: 'tab-standard', align: 'start' },
          ],
        },
      })
    } else {
      tree = split('horizontal', [
        // Left sidebar: AI agents + component navigation.
        dock({
          name: 'sidebar',
          toolbar: {
            direction: 'left',
            items: [
              { component: 'tab-sidebar', align: 'start' },
            ],
          },
          panels: [
            panel({ component: 'ai-agents-list',   title: 'Agents',     icon: 'user' }),
            panel({ component: 'panel-list',       title: 'Panels',     icon: 'columns' }),
            panel({ component: 'ui-gallery',       title: 'UI Gallery', icon: 'grid' }),
            panel({ component: 'inspector',        title: 'Inspector',  icon: 'settings' }),
            panel({ component: 'log',              title: 'Log',        icon: 'list' }),
            panel({ component: 'theme-config',     title: 'Theme',      icon: 'palette' }),
          ],
        }),

        // Right: transcript and composer in one adjustable panel.
        dock({
          name: 'chat',
          toolbar: {
            direction: 'top',
            items: [
              { component: 'tab-compact', align: 'start' },
            ],
          },
          panels: [
            panel({ component: 'ai-chat', title: 'Chat', icon: 'message-circle' }),
          ],
        }),
      ], [0.24, 0.76])
    }

    if (!isPopup) {
      const agents = aiditor.ai.agents.peek()
      const activeId = aiditor.ai.activeAgentId.peek()
      const demoAgent = agents.find(function (agent) { return agent.id === activeId }) ||
        agents[0] ||
        aiditor.ai.createAgent({ name: 'main', select: false })
      aiditor.ai.selectAgent(demoAgent.id)
    }

    const layout = createDockLayout(document.getElementById('app'), {
      tree: tree,
      lru:  { max: -1 },
      dockMenu: true,
      hooks: {
        onDirtyDiscard: function (panels) {
          console.warn('[aiditor] merge would discard ' + panels.length + ' dirty panel(s):',
            panels.map(function (p) { return p.title }))
          return 'cancel'
        },
      },
    })

    Demo.layout = layout

    if (Demo.catalog.length > 0) {
      Demo.selected.set(Demo.catalog[0].id)
    }

    // Console harness.
    window.aiditorDebug = {
      layout: layout,
      Demo:   Demo,
      tree:   function () { return layout.tree() },
      list: function () {
        function walk(n, depth) {
          const pad = '  '.repeat(depth)
          if (n.type === 'dock') {
            console.log(pad + '[' + (n.name || n.id) + '] active=' + n.activeId +
              (n.focused ? ' [focused]' : '') + (n.collapsed ? ' [collapsed]' : ''))
            for (let i = 0; i < n.panels.length; i++) {
              const p = n.panels[i]
              console.log(pad + '  - ' + p.id + ' ' + (p.title || p.component) +
                (p.id === n.activeId ? ' *' : '') + (p.dirty ? ' (dirty)' : '') +
                (p.transient ? ' (transient)' : ''))
            }
            return
          }
          console.log(pad + 'split ' + n.direction + ' [' + n.sizes.map(function (s) { return s.toFixed(2) }).join(',') + ']')
          for (let i = 0; i < n.children.length; i++) walk(n.children[i], depth + 1)
        }
        walk(layout.tree(), 0)
      },
    }

    if (!isPopup) {
      console.log('%c[aiditor]%c Component Explorer loaded',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
      console.log('  - Browse UI components in the UI Gallery panel')
      console.log('  - Drag UI cards into chat to attach precise AI context')
      console.log('  - Drag tabs across docks; pop out; split/merge via corners: all supported')
      console.log('  - Log panel (left) captures all aiditor.log entries, including errors')
    } else {
      console.log('%c[aiditor]%c popup window: waiting for migration from opener',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
    }
  </script>
</body>
</html>

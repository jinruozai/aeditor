<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EditorFrame · Component Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bundled framework + UI library — generated by tools/build.mjs from src/. -->
  <link rel="stylesheet" href="./dist/ef.css?v=8">

  <!-- Demo-only styling. -->
  <link rel="stylesheet" href="./demo/components/demo.css?v=8">
  <style>
    html, body { margin: 0; height: 100%; background: var(--ef-bg-0, #07070a); overflow: hidden; }
    #app { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- One bundle, no dependency ordering to manage. § 2.2 zero-build is preserved
       because dist/ef.js is just `cat` of src/ — see tools/build.mjs. -->
  <script src="./dist/ef.js?v=8"></script>

  <!-- Demo data & glue — must load before any component that touches Demo.*. -->
  <script src="./demo/catalog.js"></script>
  <script src="./demo/state.js"></script>

  <!-- Demo panel components. -->
  <script src="./demo/components/showcase.js"></script>
  <script src="./demo/components/component-tree.js"></script>
  <script src="./demo/components/component-search.js"></script>
  <script src="./demo/components/property-panel.js"></script>
  <script src="./demo/components/theme-config.js"></script>

  <script>
    'use strict'
    const ui = EF.ui

    // ─── dock-actions: a static toolbar component (focus + collapse) ───
    // This is not a panel component — it lives on the dock's toolbar and
    // exposes two icon buttons that drive ctx.dock.* APIs.
    EF.registerComponent('dock-actions', {
      factory: function (propsSig, ctx) {
        const wrap = ui.h('div', null, { style: 'display:inline-flex;align-items:center;gap:2px' })
        wrap.appendChild(ui.iconButton({
          icon: '⛶',
          title: 'Toggle focus mode',
          onClick: function () { ctx.dock.toggleFocus() },
        }))
        wrap.appendChild(ui.iconButton({
          icon: '⌃',
          title: 'Toggle collapsed',
          onClick: function () { ctx.dock.setCollapsed(!ctx.dock.collapsed()) },
        }))
        return wrap
      },
    })

    // ═══════════════════════════════════════════════════════════════════
    // Build the layout
    // ═══════════════════════════════════════════════════════════════════
    //
    //   ┌─────────────────────────────────────────────────────────┐
    //   │                         top row                         │
    //   │  ┌──────────┬──────────────────────┬──────────────────┐  │
    //   │  │ sidebar  │   editor (center)    │   properties     │  │
    //   │  │  tree    │  showcase-base tab   │  property-panel  │  │
    //   │  │  search  │  + others on demand  │                  │  │
    //   │  └──────────┴──────────────────────┴──────────────────┘  │
    //   │                      bottom row                          │
    //   │  ┌──────────────────────────────────────────────────────┐ │
    //   │  │         ai chat + log (collapsible)                  │ │
    //   │  └──────────────────────────────────────────────────────┘ │
    //   └─────────────────────────────────────────────────────────┘
    const { createDockLayout, dock, split, panel } = EF
    const isPopup = new URLSearchParams(window.location.search).has('ef-popup')

    let tree
    if (isPopup) {
      tree = dock({
        name: 'popup-root',
        toolbar: {
          direction: 'top',
          items: [
            { component: 'tab-standard', align: 'start' },
            { component: 'dock-actions',  align: 'end' },
          ],
        },
      })
    } else {
      tree = split('horizontal', [
        // ── Left sidebar: AI agents + component navigation ─────────
        dock({
          name: 'sidebar',
          toolbar: {
            direction: 'left',
            items: [
              { component: 'tab-sidebar', align: 'start' },
            ],
          },
          panels: [
            panel({ component: 'ai-agents-list',   title: 'AgentList',  icon: '◇' }),
            panel({ component: 'component-tree',   title: 'Components', icon: '☰' }),
            panel({ component: 'component-search', title: 'Search',     icon: '⌕' }),
          ],
        }),

        // ── Center: main view over bottom dock ─────────────────────
        split('vertical', [
          dock({
            name: 'editor',
            toolbar: {
              direction: 'top',
              items: [
                { component: 'tab-standard', align: 'start' },
                { component: 'dock-actions',  align: 'end' },
              ],
            },
            panels: [
              panel({ component: 'ai-messages',     title: 'Message',  icon: '✎' }),
              panel({ component: 'showcase-base',   title: 'Base',     icon: '◇' }),
              panel({ component: 'settings',        title: 'Settings', icon: '⚙' }),
            ],
          }),
          dock({
            name: 'bottom',
            toolbar: {
              direction: 'bottom',
              items: [
                { component: 'tab-standard', align: 'start',
                  props: { closable: false, addable: false, collapsible: true } },
                { component: 'dock-actions', align: 'end' },
              ],
            },
            panels: [
              panel({ component: 'ai-chatinput', title: 'Chat', icon: '✎' }),
              panel({ component: 'log',          title: 'Log',     icon: '📋' }),
            ],
          }),
        ], [0.72, 0.28]),

        // ── Right: property inspector ──────────────────────────────
        dock({
          name: 'properties',
          toolbar: {
            direction: 'top',
            items: [
              { component: 'tab-compact', align: 'start' },
              { component: 'dock-actions', align: 'end' },
            ],
          },
          panels: [
            panel({ component: 'property-panel', title: 'Properties', icon: '⚙' }),
          ],
        }),
      ], [0.22, 0.52, 0.26])
    }

    if (!isPopup) {
      const demoGroup = EF.ai.createGroup({ name: 'Demo AI' })
      EF.ai.createAgent({ name: 'main', path: 'demo/main', groupId: demoGroup.id })
    }

    const layout = createDockLayout(document.getElementById('app'), {
      tree: tree,
      lru:  { max: -1 },
      hooks: {
        onDirtyDiscard: function (panels) {
          console.warn('[ef] merge would discard ' + panels.length + ' dirty panel(s):',
            panels.map(function (p) { return p.title }))
          return 'cancel'
        },
      },
    })

    // Demo.select needs access to the layout to open showcase tabs on demand.
    Demo.layout = layout

    // Seed an initial selection so the property panel has something to show
    // the first time it mounts. Pick the first catalog entry.
    if (Demo.catalog.length > 0) {
      Demo.selected.set(Demo.catalog[0].id)
    }

    // ── Console harness ──────────────────────────────────────────────
    window.ef = {
      layout: layout,
      Demo:   Demo,
      tree:   function () { return layout.tree() },
      list: function () {
        function walk(n, depth) {
          const pad = '  '.repeat(depth)
          if (n.type === 'dock') {
            console.log(pad + '[' + (n.name || n.id) + '] active=' + n.activeId +
              (n.focused ? ' [focused]' : '') + (n.collapsed ? ' [collapsed]' : ''))
            for (let i = 0; i < n.panels.length; i++) {
              const p = n.panels[i]
              console.log(pad + '  - ' + p.id + ' ' + (p.title || p.component) +
                (p.id === n.activeId ? ' *' : '') + (p.dirty ? ' (dirty)' : '') +
                (p.transient ? ' (transient)' : ''))
            }
            return
          }
          console.log(pad + 'split ' + n.direction + ' [' + n.sizes.map(function (s) { return s.toFixed(2) }).join(',') + ']')
          for (let i = 0; i < n.children.length; i++) walk(n.children[i], depth + 1)
        }
        walk(layout.tree(), 0)
      },
    }

    if (!isPopup) {
      console.log('%c[ef]%c Component Explorer loaded',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
      console.log('  • Click a component in the left tree or search → showcase opens + property panel updates')
      console.log('  • Edit any prop in the property panel → the live showcased component reacts')
      console.log('  • Drag tabs across docks; pop out; split/merge via corners — all supported')
      console.log('  • Log panel (bottom) captures all EF.log entries, including errors')
    } else {
      console.log('%c[ef]%c popup window — waiting for migration from opener',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
    }
  </script>
</body>
</html>

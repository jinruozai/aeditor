<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AEditor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bundled framework + UI library, generated by tools/build.mjs from src/. -->
  <link rel="stylesheet" href="./dist/ef.css?v=8">

  <!-- Demo-only styling. -->
  <link rel="stylesheet" href="./demo/components/demo.css?v=8">
  <style>
    html, body { margin: 0; height: 100%; background: var(--ef-bg-0, #07070a); overflow: hidden; }
    .aed-topbar {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 10px;
      background: var(--ef-bg-1, #202020);
      border-bottom: 1px solid var(--ef-border, #3a3a3a);
      color: var(--ef-fg-1, #e8e8e8);
      box-sizing: border-box;
      user-select: none;
    }
    .aed-brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 28px;
      padding: 0 9px 0 7px;
      border: 1px solid transparent;
      border-radius: var(--ef-r-2, 4px);
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }
    .aed-brand:hover {
      background: var(--ef-bg-hover, rgba(255,255,255,.06));
      border-color: var(--ef-border-soft, rgba(255,255,255,.08));
    }
    .aed-brand-icon {
      width: 20px;
      height: 20px;
      background: url("./logo.svg") center / contain no-repeat;
      flex: none;
    }
    .aed-brand-name {
      letter-spacing: 0;
    }
    .aed-project-name {
      min-width: 0;
      max-width: 40vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--ef-fg-2, #bdbdbd);
      font-size: 12px;
    }
    .aed-project-name::before {
      content: "/";
      margin-right: 10px;
      color: var(--ef-fg-3, #888);
    }
    .aed-topbar-spacer { flex: 1 1 auto; }
    .aed-lang-btn { min-width: 58px; }
    .aed-body { width: 100vw; height: calc(100dvh - 36px); overflow: hidden; }
    #app { width: 100%; height: 100%; }
    body.is-popup .aed-topbar { display: none; }
    body.is-popup .aed-body { height: 100dvh; }
  </style>
</head>
<body>
  <div id="aed-topbar" class="aed-topbar"></div>
  <div class="aed-body">
    <div id="app"></div>
  </div>

  <!-- One bundle, no dependency ordering to manage. Section 2.2 zero-build is preserved
       because dist/ef.js is just `cat` of src/; see tools/build.mjs. -->
  <script src="./dist/ef.js?v=8"></script>

  <!-- Demo data & glue; must load before any component that touches Demo.*. -->
  <script src="./demo/catalog.js"></script>
  <script src="./demo/state.js"></script>
  <script src="./demo/ai-targets.js"></script>
  <script src="./demo/topbar.js"></script>

  <!-- Demo panel components. -->
  <script src="./demo/components/ui-gallery.js"></script>
  <script src="./demo/components/panel-list.js"></script>
  <script src="./demo/components/theme-config.js"></script>

  <script>
    'use strict'
    const ui = EF.ui

    // dock-actions: a static toolbar component for focus mode.
    // This is not a panel component; it lives on the dock's toolbar and
    // exposes a single two-state icon button that drives ctx.dock.* APIs.
    EF.registerComponent('dock-actions', {
      factory: function (propsSig, ctx) {
        const wrap = ui.h('div', 'demo-dock-actions')
        const focusIcon = EF.derived(function () { return ctx.dock.focused() ? 'minimize' : 'maximize' })
        const focusTitle = EF.derived(function () { return ctx.dock.focused() ? 'Restore panel' : 'Focus panel' })
        ui.collect(wrap, focusIcon.dispose)
        ui.collect(wrap, focusTitle.dispose)
        wrap.appendChild(ui.iconButton({
          icon: focusIcon,
          title: focusTitle,
          onClick: function () { ctx.dock.toggleFocus() },
        }))
        return wrap
      },
    })

    // Build the layout
    //
    // Layout: left navigation dock + combined AI chat dock.
    const { createDockLayout, dock, split, panel } = EF
    const isPopup = new URLSearchParams(window.location.search).has('ef-popup')
    document.body.classList.toggle('is-popup', isPopup)
    if (!isPopup && window.AEditorTopBar) {
      window.AEditorTopBar.mount(document.getElementById('aed-topbar'))
    }

    let tree
    if (isPopup) {
      tree = dock({
        name: 'popup-root',
        toolbar: {
          direction: 'top',
          items: [
            { component: 'tab-standard', align: 'start' },
            { component: 'dock-actions',  align: 'end' },
          ],
        },
      })
    } else {
      tree = split('horizontal', [
        // Left sidebar: AI agents + component navigation.
        dock({
          name: 'sidebar',
          toolbar: {
            direction: 'left',
            items: [
              { component: 'tab-sidebar', align: 'start' },
            ],
          },
          panels: [
            panel({ component: 'ai-agents-list',   title: 'Agents',     icon: 'user' }),
            panel({ component: 'panel-list',       title: 'Panels',     icon: 'columns' }),
            panel({ component: 'ui-gallery',       title: 'UI Gallery', icon: 'grid' }),
            panel({ component: 'log',              title: 'Log',        icon: 'list' }),
            panel({ component: 'theme-config',     title: 'Theme',      icon: 'palette' }),
          ],
        }),

        // Right: transcript and composer in one adjustable panel.
        dock({
          name: 'chat',
          toolbar: {
            direction: 'top',
            items: [
              { component: 'tab-compact', align: 'start' },
              { component: 'dock-actions', align: 'end' },
            ],
          },
          panels: [
            panel({ component: 'ai-chat', title: 'Chat', icon: 'message-circle' }),
          ],
        }),
      ], [0.24, 0.76])
    }

    if (!isPopup) {
      const agents = EF.ai.agents.peek()
      const activeId = EF.ai.activeAgentId.peek()
      const demoAgent = agents.find(function (agent) { return agent.id === activeId }) ||
        agents[0] ||
        EF.ai.createAgent({ name: 'main', select: false })
      EF.ai.selectAgent(demoAgent.id)
    }

    const layout = createDockLayout(document.getElementById('app'), {
      tree: tree,
      lru:  { max: -1 },
      hooks: {
        onDirtyDiscard: function (panels) {
          console.warn('[ef] merge would discard ' + panels.length + ' dirty panel(s):',
            panels.map(function (p) { return p.title }))
          return 'cancel'
        },
      },
    })

    Demo.layout = layout

    if (Demo.catalog.length > 0) {
      Demo.selected.set(Demo.catalog[0].id)
    }

    // Console harness.
    window.ef = {
      layout: layout,
      Demo:   Demo,
      tree:   function () { return layout.tree() },
      list: function () {
        function walk(n, depth) {
          const pad = '  '.repeat(depth)
          if (n.type === 'dock') {
            console.log(pad + '[' + (n.name || n.id) + '] active=' + n.activeId +
              (n.focused ? ' [focused]' : '') + (n.collapsed ? ' [collapsed]' : ''))
            for (let i = 0; i < n.panels.length; i++) {
              const p = n.panels[i]
              console.log(pad + '  - ' + p.id + ' ' + (p.title || p.component) +
                (p.id === n.activeId ? ' *' : '') + (p.dirty ? ' (dirty)' : '') +
                (p.transient ? ' (transient)' : ''))
            }
            return
          }
          console.log(pad + 'split ' + n.direction + ' [' + n.sizes.map(function (s) { return s.toFixed(2) }).join(',') + ']')
          for (let i = 0; i < n.children.length; i++) walk(n.children[i], depth + 1)
        }
        walk(layout.tree(), 0)
      },
    }

    if (!isPopup) {
      console.log('%c[ef]%c Component Explorer loaded',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
      console.log('  - Browse UI components in the UI Gallery panel')
      console.log('  - Drag UI cards into chat to attach precise AI context')
      console.log('  - Drag tabs across docks; pop out; split/merge via corners: all supported')
      console.log('  - Log panel (left) captures all EF.log entries, including errors')
    } else {
      console.log('%c[ef]%c popup window: waiting for migration from opener',
        'color:#7b6ef6;font-weight:bold', 'color:inherit')
    }
  </script>
</body>
</html>
